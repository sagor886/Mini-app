<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #16213e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        button {
            background-color: #0f3460;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Welcome to Mini App! 🚀</h1>
        <p id="user-info">Loading Telegram User Data...</p>
        <button onclick="checkServer()">Server Status Check</button>
        <p id="server-status"></p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if(tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-info').innerText = "Hello, " + tg.initDataUnsafe.user.first_name + "! 👋";
        } else {
            document.getElementById('user-info').innerText = "Opened outside Telegram Browser";
        }

        async function checkServer() {
            document.getElementById('server-status').innerText = "Connecting to backend...";
            try {
                const res = await fetch('https://mini-app-jvwc.onrender.com/');
                const text = await res.text();
                document.getElementById('server-status').innerText = "Backend Response: " + text;
            } catch (err) {
                document.getElementById('server-status').innerText = "Connection Error!";
            }
        }
    </script>
</body>
</html>
