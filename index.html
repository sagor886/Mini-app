<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Earn & Watch Mini App</ttitleitle>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#f0f5ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#1e1b4b',
                        },
                        darkbg: '#0f172a',
                        cardbg: '#1e293b',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            user-select: none;
            -webkit-user-select: none;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .active-tab {
            color: #818cf8;
            position: relative;
        }
        .active-tab::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 3px;
            background-color: #818cf8;
            border-radius: 999px;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-darkbg text-slate-100 min-h-screen flex flex-col justify-between pb-20">

    <!-- Top Header -->
    <header class="sticky top-0 z-40 glass px-4 py-3 flex items-center justify-between border-b border-slate-800">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center font-bold text-lg shadow-lg">
                <span id="userAvatar">U</span>
            </div>
            <div>
                <h3 class="font-bold text-sm text-slate-100" id="userName">Telegram User</h3>
                <p class="text-xs text-indigo-400 font-medium" id="userTag">@user_tg</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-slate-800/80 border border-slate-700/60 px-3 py-1.5 rounded-full flex items-center gap-2 shadow-inner">
                <i class="fa-solid fa-wallet text-amber-400 text-sm"></i>
                <span class="text-sm font-bold text-emerald-400" id="userBalance">$0.00</span>
            </div>
            <button onclick="toggleViewMode()" id="modeToggleBtn" class="bg-indigo-600/30 hover:bg-indigo-600/50 border border-indigo-500/30 text-indigo-300 text-xs px-2.5 py-1.5 rounded-lg flex items-center gap-1 font-semibold transition">
                <i class="fa-solid fa-user-shield"></i>
                <span id="modeText">Admin</span>
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow p-4 max-w-lg mx-auto w-full">

        <!-- USER PANEL VIEWS -->
        <div id="userViews">

            <!-- 1. HOME / VIDEOS TAB -->
            <section id="tab-home" class="space-y-4">
                <!-- Banner -->
                <div class="relative rounded-2xl overflow-hidden p-5 bg-gradient-to-r from-indigo-600 to-purple-600 shadow-xl border border-indigo-400/20">
                    <div class="relative z-10">
                        <span class="bg-white/20 text-white text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full">Watch & Earn</span>
                        <h2 class="text-xl font-extrabold mt-1 text-white">Unlock Exclusive Content</h2>
                        <p class="text-xs text-indigo-100 mt-1">Watch short ads to unlock premium viral videos instantly.</p>
                    </div>
                    <i class="fa-solid fa-play-circle absolute -bottom-4 -right-4 text-8xl opacity-20 text-white"></i>
                </div>

                <!-- Category Filters -->
                <div class="flex gap-2 overflow-x-auto hide-scrollbar py-1">
                    <button class="bg-indigo-600 text-white text-xs font-semibold px-4 py-2 rounded-xl whitespace-nowrap shadow-md">All Videos</button>
                    <button class="bg-slate-800 text-slate-400 text-xs font-semibold px-4 py-2 rounded-xl whitespace-nowrap border border-slate-700">Viral Clips</button>
                    <button class="bg-slate-800 text-slate-400 text-xs font-semibold px-4 py-2 rounded-xl whitespace-nowrap border border-slate-700">Trending</button>
                    <button class="bg-slate-800 text-slate-400 text-xs font-semibold px-4 py-2 rounded-xl whitespace-nowrap border border-slate-700">Movies & Teasers</button>
                </div>

                <!-- Video Grid -->
                <div class="space-y-4" id="videoFeed">
                    <!-- Dynamic Video Items will be injected here -->
                </div>
            </section>

            <!-- 2. TASKS TAB -->
            <section id="tab-tasks" class="space-y-4 hidden">

                        <p class="text-xs text-slate-400">Complete quick tasks to earn direct cash rewards</p>

                    </div>

                <div class="space-y-3" id="taskList">
                    <!-- Dynamic Tasks Injected Here -->
                </div>
            </section>

            <!-- 3. WITHDRAW TAB -->

                            <span class="text-xs font-bold">bKash</span>
                        </button>
                        <button onclick="selectPaymentMethod('Nagad')" class="pm-btn border border-slate-700 bg-slate-800/50 p-3 rounded-xl flex flex-col items-center gap-1">

                        </button>
                        <button onclick="selectPaymentMethod('USDT')" class="pm-btn border border-slate-700 bg-slate-800/50 p-3 rounded-xl flex flex-col items-center gap-1">

                        </div>

                            <label class="text-xs font-semibold text-slate-400 block mb-1">Amount (USD $)</label>

                        </div>

                </div>

                <div class="glass p-4 rounded-2xl border border-slate-800">

                    <div id="withdrawHistory" class="text-xs text-slate-500 text-center py-4">

                    </div>
                </div>
            </section>

            <!-- 4. PROFILE & REFERRAL TAB -->
            <section id="tab-profile" class="space-y-4 hidden">
                <div class="glass p-5 rounded-2xl border border-slate-800 text-center relative">
                    <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-600 mx-auto flex items-center justify-center text-2xl font-black shadow-xl mb-3 border-4 border-slate-800">
                        <span id="profileAvatar">U</span>
                    </div>
                    <h2 class="font-bold text-lg text-slate-100" id="profileName">User Name</h2>
                    <p class="text-xs text-indigo-400 font-medium" id="profileTag">@username</p>

                    <div class="grid grid-cols-2 gap-3 mt-5 pt-4 border-t border-slate-800/80">
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                            <p class="text-[11px] text-slate-400">Total Earned</p>
                            <p class="text-lg font-bold text-emerald-400">$2.45</p>
                        </div>
                        <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                            <p class="text-[11px] text-slate-400">Total Referrals</p>
                            <p class="text-lg font-bold text-indigo-400">12 Users</p>
                        </div>
                    </div>
                </div>

                <!-- Referral Box -->
                <div class="bg-slate-800/60 p-4 rounded-2xl border border-slate-700/80 space-y-3">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-users text-indigo-400"></i>
                        <h3 class="font-bold text-sm">Invite Friends & Earn</h3>
                    </div>
                    <p class="text-xs text-slate-400">Get 10% lifetime commission on every task completed by your referred friends.</p>
                    <div class="flex gap-2">
                        <input type="text" readonly value="https://t.me/BotName?start=ref_12345" class="bg-slate-900 border border-slate-700 text-xs text-indigo-300 rounded-xl px-3 py-2 w-full focus:outline-none">
                        <button onclick="copyRefLink()" class="bg-indigo-600 text-white font-bold text-xs px-4 py-2 rounded-xl hover:bg-indigo-700 transition">Copy</button>
                    </div>
                </div>
            </section>

        </div>


        <!-- ADMIN PANEL VIEW (Hidden by default) -->
        <div id="adminViews" class="hidden space-y-5">
            <div class="bg-indigo-950/80 border border-indigo-500/30 p-4 rounded-2xl flex items-center justify-between">
                <div>
                    <span class="bg-indigo-500/20 text-indigo-300 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase">Super Admin</span>
                    <h2 class="text-lg font-black text-white mt-1">Admin Control Panel</h2>
                </div>
                <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-white">
                    <i class="fa-solid fa-sliders"></i>
                </div>
            </div>

            <!-- Admin Sub Navigation -->
            <div class="flex gap-2 overflow-x-auto hide-scrollbar border-b border-slate-800 pb-2">
                <button onclick="showAdminTab('adm-tasks')" class="adm-tab-btn bg-indigo-600 text-white text-xs font-semibold px-3 py-2 rounded-xl whitespace-nowrap">Task Manager</button>
                <button onclick="showAdminTab('adm-video')" class="adm-tab-btn bg-slate-800 text-slate-400 text-xs font-semibold px-3 py-2 rounded-xl whitespace-nowrap">Upload Video</button>
                <button onclick="showAdminTab('adm-ads')" class="adm-tab-btn bg-slate-800 text-slate-400 text-xs font-semibold px-3 py-2 rounded-xl whitespace-nowrap">Ad Networks</button>
                <button onclick="showAdminTab('adm-settings')" class="adm-tab-btn bg-slate-800 text-slate-400 text-xs font-semibold px-3 py-2 rounded-xl whitespace-nowrap">Core Settings</button>
            </div>

            <!-- Admin Tab 1: Task Management -->
            <div id="adm-tasks" class="adm-subview space-y-4">
                <div class="glass p-4 rounded-2xl border border-slate-800 space-y-3">
                    <h3 class="font-bold text-sm text-indigo-300">Create New Task</h3>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Task Type</label>
                        <select id="newTaskType" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                            <option value="telegram">Telegram Channel/Group</option>
                            <option value="website">Website Visit</option>
                            <option value="direct">Direct Link / Monetag</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Task Title</label>
                        <input type="text" id="newTaskTitle" placeholder="Join Official Channel" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Target URL</label>
                        <input type="text" id="newTaskUrl" placeholder="https://t.me/..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[11px] text-slate-400 block mb-1">Reward ($)</label>
                            <input type="number" id="newTaskReward" placeholder="0.05" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                        </div>
                        <div>
                            <label class="text-[11px] text-slate-400 block mb-1">Timer (Sec)</label>
                            <input type="number" id="newTaskTimer" placeholder="15" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                        </div>
                    </div>
                    <button onclick="createNewTask()" class="w-full bg-indigo-600 hover:bg-indigo-700 font-bold text-xs py-2.5 rounded-xl text-white transition">Publish Task</button>
                </div>
            </div>

            <!-- Admin Tab 2: Upload Video Studio -->
            <div id="adm-video" class="adm-subview space-y-4 hidden">
                <div class="glass p-4 rounded-2xl border border-slate-800 space-y-3">
                    <h3 class="font-bold text-sm text-indigo-300">Upload / Publish Video</h3>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Video Title</label>
                        <input type="text" id="newVidTitle" placeholder="Exclusive Viral Clip #102" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Thumbnail Image URL</label>
                        <input type="text" id="newVidThumb" placeholder="https://images.unsplash.com/..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[11px] text-slate-400 block mb-1">Category</label>
                            <select id="newVidCat" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                                <option>Viral Video</option>
                                <option>Trending</option>
                                <option>Teasers</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[11px] text-slate-400 block mb-1">Ads Required</label>
                            <input type="number" id="newVidAds" value="2" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                        </div>
                    </div>
                    <button onclick="publishNewVideo()" class="w-full bg-purple-600 hover:bg-purple-700 font-bold text-xs py-2.5 rounded-xl text-white transition">Publish & Broadcast</button>
                </div>
            </div>

            <!-- Admin Tab 3: Ad Management -->
            <div id="adm-ads" class="adm-subview space-y-4 hidden">
                <div class="glass p-4 rounded-2xl border border-slate-800 space-y-3">
                    <h3 class="font-bold text-sm text-indigo-300">Ad Network Integration</h3>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Network Name</label>
                        <input type="text" placeholder="Monetag / Adsterra Direct" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Direct Link / Script Tag</label>
                        <textarea rows="3" placeholder="https://www.highrevenuegate.com/..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200"></textarea>
                    </div>
                    <button onclick="alert('Ad Configuration Saved!')" class="w-full bg-amber-600 hover:bg-amber-700 font-bold text-xs py-2.5 rounded-xl text-white transition">Save Ad Rotation</button>
                </div>
            </div>

            <!-- Admin Tab 4: Core Settings -->
            <div id="adm-settings" class="adm-subview space-y-4 hidden">
                <div class="glass p-4 rounded-2xl border border-slate-800 space-y-3">
                    <h3 class="font-bold text-sm text-indigo-300">Bot & Server Speed Tuning</h3>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Auto-Delete Video Timer (Minutes)</label>
                        <input type="number" value="15" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">User to User Delay (Seconds)</label>
                        <input type="number" value="5" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-400 block mb-1">Notification Speed Batch</label>
                        <select class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-xs text-slate-200">
                            <option>10x Normal Speed</option>
                            <option>20x High Speed</option>
                        </select>
                    </div>
                    <button onclick="alert('Core Settings Updated!')" class="w-full bg-emerald-600 hover:bg-emerald-700 font-bold text-xs py-2.5 rounded-xl text-white transition">Update Core Settings</button>
                </div>
            </div>

        </div>

    </main>

    <!-- Bottom Navigation Bar (User Panel Only) -->
    <nav id="userBottomNav" class="fixed bottom-0 left-0 right-0 glass border-t border-slate-800 px-6 py-2.5 z-40">
        <div class="flex justify-around items-center max-w-md mx-auto">
            <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition active-tab">
                <i class="fa-solid fa-house text-lg"></i>
                <span class="text-[10px] font-bold mt-1">Videos</span>
            </button>
            <button onclick="switchTab('tasks')" id="nav-tasks" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition">
                <i class="fa-solid fa-list-check text-lg"></i>
                <span class="text-[10px] font-bold mt-1">Tasks</span>
            </button>
            <button onclick="switchTab('withdraw')" id="nav-withdraw" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition">
                <i class="fa-solid fa-money-bill-transfer text-lg"></i>
                <span class="text-[10px] font-bold mt-1">Withdraw</span>
            </button>
            <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-slate-400 hover:text-indigo-400 transition">
                <i class="fa-solid fa-user text-lg"></i>
                <span class="text-[10px] font-bold mt-1">Profile</span>
            </button>
        </div>
    </nav>

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-16 left-1/2 -translate-x-1/2 z-50 bg-indigo-600 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-2xl transition-all duration-300 opacity-0 pointer-events-none flex items-center gap-2">
        <i class="fa-solid fa-circle-check"></i>
        <span id="toastMsg">Action completed!</span>
    </div>

    <!-- JavaScript Application Logic -->
    <script>
        // State Management
        let appState = {
            balance: 0.85,
            isAdmin: false,
            activeTab: 'home',
            paymentMethod: 'bKash',
            videos: [
                {
                    id: 1,
                    title: '🔥 New Viral Trending Video #1',
                    category: 'Viral Clip',
                    thumb: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&auto=format&fit=crop&q=60',
                    adsNeeded: 2,
                    adsWatched: 0,
                    unlocked: false
                },
                {
                    id: 2,
                    title: '🎬 Exclusive Movie Preview & Leak',
                    category: 'Teasers',
                    thumb: 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=600&auto=format&fit=crop&q=60',
                    adsNeeded: 1,
                    adsWatched: 0,
                    unlocked: false
                }
            ],
            tasks: [
                {
                    id: 1,
                    title: 'Join Telegram Channel',
                    url: 'https://t.me/example',
                    reward: 0.05,
                    timer: 10,
                    completed: false
                },
                {
                    id: 2,
                    title: 'Visit Direct Sponsor Link',
                    url: 'https://monetag.com',
                    reward: 0.10,
                    timer: 15,
                    completed: false
                }
            ]
        };

        // Initialize Telegram WebApp
        window.addEventListener('DOMContentLoaded', () => {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.expand();
                if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                    const u = tg.initDataUnsafe.user;
                    document.getElementById('userName').innerText = `${u.first_name || ''} ${u.last_name || ''}`;
                    document.getElementById('profileName').innerText = `${u.first_name || ''} ${u.last_name || ''}`;
                    document.getElementById('userTag').innerText = u.username ? `@${u.username}` : '@user';
                    document.getElementById('profileTag').innerText = u.username ? `@${u.username}` : '@user';
                    document.getElementById('userAvatar').innerText = u.first_name ? u.first_name[0] : 'U';
                    document.getElementById('profileAvatar').innerText = u.first_name ? u.first_name[0] : 'U';
                }
            }
            renderApp();
        });

        // Render Functions
        function renderApp() {
            // Update Balance Display
            document.getElementById('userBalance').innerText = `$${appState.balance.toFixed(2)}`;
            document.getElementById('withdrawBalance').innerText = `$${appState.balance.toFixed(2)}`;

            renderVideos();
            renderTasks();
        }

        // Render Video Feed
        function renderVideos() {
            const feed = document.getElementById('videoFeed');
            feed.innerHTML = '';
            appState.videos.forEach(v => {
                const card = document.createElement('div');
                card.className = "glass rounded-2xl overflow-hidden border border-slate-800 shadow-md";
                card.innerHTML = `
                    <div class="relative h-44 w-full bg-slate-900">
                        <img src="${v.thumb}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                            ${v.unlocked ? 
                                `<button onclick="playVideo('${v.title}')" class="w-12 h-12 rounded-full bg-emerald-500 flex items-center justify-center text-white text-xl shadow-lg hover:scale-105 transition"><i class="fa-solid fa-play ml-1"></i></button>` : 
                                `<div class="text-center p-3">
                                    <i class="fa-solid fa-lock text-3xl text-amber-400 mb-1"></i>
                                    <p class="text-xs font-bold text-white">Locked Video</p>
                                </div>`
                            }
                        </div>
                        <span class="absolute top-3 left-3 bg-slate-900/80 text-indigo-300 text-[10px] font-bold px-2.5 py-1 rounded-full border border-slate-700">${v.category}</span>
                    </div>
                    <div class="p-4 space-y-3">
                        <h4 class="font-bold text-sm text-slate-100">${v.title}</h4>
                        ${v.unlocked ? 
                            `<button onclick="playVideo('${v.title}')" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-xl text-xs flex items-center justify-center gap-2">
                                <i class="fa-solid fa-circle-play"></i> Watch Video Now
                            </button>` : 
                            `<div class="flex items-center justify-between gap-3">
                                <span class="text-xs text-slate-400">Ads: <b class="text-amber-400">${v.adsWatched}/${v.adsNeeded}</b></span>
                                <button onclick="watchAdForVideo(${v.id})" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-1.5 transition">
                                    <i class="fa-solid fa-rectangle-ad"></i> Watch Ad to Unlock
                                </button>
                            </div>`
                        }
                    </div>
                `;
                feed.appendChild(card);
            });
        }

        // Render Tasks
        function renderTasks() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            appState.tasks.forEach(t => {
                const item = document.createElement('div');
                item.className = "glass p-4 rounded-2xl border border-slate-800 flex items-center justify-between";
                item.innerHTML = `
                    <div class="space-y-1">
                        <h4 class="font-bold text-xs text-slate-200">${t.title}</h4>
                        <p class="text-[11px] text-emerald-400 font-bold">Reward: +$${t.reward.toFixed(2)}</p>
                    </div>
                    ${t.completed ? 
                        `<span class="bg-emerald-500/10 text-emerald-400 text-xs font-bold px-3 py-1.5 rounded-xl border border-emerald-500/20"><i class="fa-solid fa-check"></i> Done</span>` : 
                        `<button onclick="startTask(${t.id})" id="taskBtn-${t.id}" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition">
                            Start (${t.timer}s)
                        </button>`
                    }
                `;
                list.appendChild(item);
            });
        }

        // User Tab Switch
        function switchTab(tab) {
            appState.activeTab = tab;
            ['home', 'tasks', 'withdraw', 'profile'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('active-tab');
            });
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active-tab');
        }

        // Ad Unlock Logic
        function watchAdForVideo(id) {
            const v = appState.videos.find(item => item.id === id);
            if (!v) return;
            
            showToast('Opening Ad link... Please wait 5s');
            window.open('https://monetag.com', '_blank');

            setTimeout(() => {
                v.adsWatched += 1;
                if (v.adsWatched >= v.adsNeeded) {
                    v.unlocked = true;
                    showToast('🎉 Video Unlocked Successfully!');
                } else {
                    showToast(`Ad Watched! (${v.adsWatched}/${v.adsNeeded})`);
                }
                renderVideos();
            }, 3000);
        }

        function playVideo(title) {
            alert(`▶️ Playing Video: ${title}\n(In Telegram Player)`);
        }

        // Task Timer & Reward Logic
        function startTask(id) {
            const t = appState.tasks.find(item => item.id === id);
            if (!t || t.completed) return;

            window.open(t.url, '_blank');
            const btn = document.getElementById(`taskBtn-${id}`);
            let left = t.timer;

            btn.disabled = true;
            btn.className = "bg-slate-700 text-slate-300 text-xs font-bold px-4 py-2 rounded-xl";

            const interval = setInterval(() => {
                left--;
                btn.innerText = `Wait ${left}s...`;
                if (left <= 0) {
                    clearInterval(interval);
                    t.completed = true;
                    appState.balance += t.reward;
                    showToast(`+$${t.reward.toFixed(2)} Added to Balance!`);
                    renderApp();
                }
            }, 1000);
        }

        // Withdraw Process
        function selectPaymentMethod(method) {
            appState.paymentMethod = method;
            document.querySelectorAll('.pm-btn').forEach(btn => {
                btn.classList.remove('border-indigo-500', 'bg-indigo-500/10');
                btn.classList.add('border-slate-700', 'bg-slate-800/50');
            });
            event.currentTarget.classList.remove('border-slate-700', 'bg-slate-800/50');
            event.currentTarget.classList.add('border-indigo-500', 'bg-indigo-500/10');
        }

        function processWithdrawal() {
            const acc = document.getElementById('withdrawAccount').value;
            const amt = parseFloat(document.getElementById('withdrawAmount').value);

            if (!acc || !amt) {
                showToast('Please enter account number and amount!');
                return;
            }
            if (amt < 1.00) {
                showToast('Minimum withdrawal is $1.00');
                return;
            }
            if (amt > appState.balance) {
                showToast('Insufficient balance!');
                return;
            }

            appState.balance -= amt;
            renderApp();
            showToast('Withdrawal request submitted!');

            const history = document.getElementById('withdrawHistory');
            history.innerHTML = `
                <div class="flex justify-between items-center bg-slate-900/60 p-2.5 rounded-xl border border-slate-800 text-left">
                    <div>
                        <p class="font-bold text-slate-200">${appState.paymentMethod} - ${acc}</p>
                        <p class="text-[10px] text-amber-400">Pending Review</p>
                    </div>
                    <span class="font-bold text-emerald-400">$${amt.toFixed(2)}</span>
                </div>
            `;
        }

        // Admin Toggle
        function toggleViewMode() {
            appState.isAdmin = !appState.isAdmin;
            const uViews = document.getElementById('userViews');
            const aViews = document.getElementById('adminViews');
            const nav = document.getElementById('userBottomNav');
            const modeText = document.getElementById('modeText');

            if (appState.isAdmin) {
                uViews.classList.add('hidden');
                aViews.classList.remove('hidden');
                nav.classList.add('hidden');
                modeText.innerText = 'User View';
                showToast('Switched to Admin Panel');
            } else {
                uViews.classList.remove('hidden');
                aViews.classList.add('hidden');
                nav.classList.remove('hidden');
                modeText.innerText = 'Admin';
                showToast('Switched to User App');
            }
        }

        function showAdminTab(tabId) {
            document.querySelectorAll('.adm-subview').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }

        function createNewTask() {
            const title = document.getElementById('newTaskTitle').value;
            const url = document.getElementById('newTaskUrl').value;
            const reward = parseFloat(document.getElementById('newTaskReward').value) || 0.05;
            const timer = parseInt(document.getElementById('newTaskTimer').value) || 10;

            if (!title || !url) {
                showToast('Fill in title and URL');
                return;
            }

            appState.tasks.push({
                id: Date.now(),
                title: title,
                url: url,
                reward: reward,
                timer: timer,
                completed: false
            });

            showToast('New Task Created!');
            renderTasks();
        }

        function publishNewVideo() {
            const title = document.getElementById('newVidTitle').value;
            const thumb = document.getElementById('newVidThumb').value || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&auto=format&fit=crop&q=60';
            const cat = document.getElementById('newVidCat').value;
            const ads = parseInt(document.getElementById('newVidAds').value) || 2;

            if (!title) {
                showToast('Enter video title');
                return;
            }

            appState.videos.unshift({
                id: Date.now(),
                title: title,
                category: cat,
                thumb: thumb,
                adsNeeded: ads,
                adsWatched: 0,
                unlocked: false
            });

            showToast('Video Published & Broadcasted!');
            renderVideos();
        }

        function copyRefLink() {
            showToast('Referral link copied to clipboard!');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 2500);
        }
    </script>
</body>
</html>
